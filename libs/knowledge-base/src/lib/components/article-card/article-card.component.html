<mat-expansion-panel class="article-item">
  <mat-expansion-panel-header>
    <mat-panel-title>
      <span class="tech-badge">{{ article().technology }}</span>
      <mat-chip-set>
        <mat-chip class="topic-chip text-ellipsis"
          >#{{ article().topic }}</mat-chip
        >
      </mat-chip-set>
    </mat-panel-title>
    <mat-panel-description>
      <mat-icon>business</mat-icon> {{ article().company }}
    </mat-panel-description>
  </mat-expansion-panel-header>

  <div class="article-content">
    <p>{{ article().question }}</p>
    <p class="description">{{ article().description }}</p>
    <div class="answer-box">
      <strong>Ответ:</strong>
      <p>{{ article().answer }}</p>
    </div>
    <div class="tags">
      <mat-chip-set>
        <mat-chip [ngClass]="article().difficulty?.toLowerCase()">{{
          article().difficulty
        }}</mat-chip>
      </mat-chip-set>
    </div>
  </div>
</mat-expansion-panel>
