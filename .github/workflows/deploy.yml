name: Deploy to GitHub Pages

on:
  push:
    branches: [master] # Робот сработает при каждом пуше в master

# Разрешения для работы с GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # Более надежная установка для серверов, чем npm install

      - name: Build Angular Project
        # Используем вашу команду с правильным base-href
        run: npx nx build admin-panel --prod --base-href /ng-highcharts-canvas/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Указываем путь к папке, которую собрал Nx
          path: dist/apps/admin-panel

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
