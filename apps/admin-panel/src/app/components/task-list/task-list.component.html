<div class="task-manager">
  @if (tasksMap.size === 4) { @for (category of categoriesArray; track category;
  let i = $index) {
  <div
    [style.background-color]="i | distributeColor : randomOffset"
    class="task-manager__item"
  >
    <!-- <h3>{{ getNextDay(item) | date:'dd.MM.yyyy' }}</h3> -->
    <h6>{{ category }}</h6>
    @for (task of tasksMap.get(category); track task) {
    <div>{{ task.title }}</div>
    }
  </div>
  } }
</div>
